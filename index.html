<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>１対１スマイルスタディ 出退勤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<style>
  :root{
    --bg:#12203a;
    --paper:#f5f1e8;
    --gold:#f2b705;
    --teal:#4fb6a8;
    --red:#e4572e;
    --orange:#e8862e;
    --muted:#8fa0c2;
    --panel:#1b2c4d;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;height:100%;
    background:var(--bg);
    color:var(--paper);
    font-family:'Noto Sans JP',sans-serif;
    overflow:hidden;
    -webkit-user-select:none;user-select:none;
  }
  #app{ position:relative; height:100vh; display:flex; flex-direction:column; }
  header{
    padding:24px 32px 12px;
    display:flex; justify-content:space-between; align-items:baseline;
    position:relative; z-index:2;
  }
  header .brand{ font-family:'Zen Maru Gothic',sans-serif; font-weight:700; font-size:22px; letter-spacing:.02em; }
  header .brand span{ display:block; font-size:14px; font-weight:500; color:var(--muted); margin-top:4px; }
  header .clock{ font-variant-numeric:tabular-nums; color:var(--muted); font-size:16px; }
  main{ flex:1; position:relative; display:flex; align-items:center; justify-content:center; }
  video{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; filter:brightness(.7); }
  #frame{ position:relative; width:min(60vmin,420px); height:min(60vmin,420px); z-index:2; }
  .corner{ position:absolute; width:44px; height:44px; border:4px solid var(--gold); opacity:.9; }
  .corner.tl{top:0;left:0;border-right:none;border-bottom:none;border-radius:12px 0 0 0;}
  .corner.tr{top:0;right:0;border-left:none;border-bottom:none;border-radius:0 12px 0 0;}
  .corner.bl{bottom:0;left:0;border-right:none;border-top:none;border-radius:0 0 0 12px;}
  .corner.br{bottom:0;right:0;border-left:none;border-top:none;border-radius:0 0 12px 0;}
  #frame.pulse .corner{ animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{opacity:.5;} 50%{opacity:1;} }
  footer{ padding:28px 24px 40px; text-align:center; position:relative; z-index:2; }
  #status{ font-size:20px; color:var(--muted); }
  #debug{ font-size:12px; color:#5b6c8f; margin-top:6px; min-height:16px; }
  #settings-link{ font-size:12px; color:#3d4d70; margin-top:10px; cursor:pointer; }
  #camera-error{ display:none; position:absolute; inset:0; background:var(--bg); z-index:5; align-items:center; justify-content:center; text-align:center; padding:40px; font-size:18px; color:var(--muted); }
  /* ===== オーバーレイ（設定・選択・入力・結果画面） ===== */
  #overlay{
    position:absolute; inset:0; z-index:10;
    display:none;
    align-items:center; justify-content:center;
    background:rgba(10,16,32,.78);
    backdrop-filter:blur(2px);
  }
  #overlay.show{ display:flex; }
  .card{
    width:min(90vw,520px);
    max-height:88vh; overflow-y:auto;
    background:var(--panel);
    border-radius:24px;
    padding:36px 32px;
    box-shadow:0 20px 60px rgba(0,0,0,.4);
  }
  .ov-teacher{ font-family:'Zen Maru Gothic',sans-serif; font-weight:700; font-size:28px; text-align:center; margin-bottom:18px; }
  .ov-body{ font-size:17px; color:var(--paper); line-height:1.7; }
  .ov-label{ display:block; font-size:14px; color:var(--muted); margin:18px 0 6px; }
  .ov-input{
    width:100%; padding:16px; font-size:22px; border-radius:12px; border:none;
    background:#0f1a30; color:var(--paper); font-variant-numeric:tabular-nums;
  }
  .ov-input:focus{ outline:2px solid var(--gold); }
  select.ov-input{ font-size:18px; }
  .ov-check{ display:flex; align-items:center; gap:10px; margin-top:20px; font-size:16px; }
  .ov-check input{ width:22px; height:22px; }
  .ov-actions{ display:flex; gap:12px; margin-top:26px; }
  .ov-actions.stack{ flex-direction:column; }
  .btn{
    flex:1; padding:18px; border:none; border-radius:14px; font-size:18px; font-weight:700;
    font-family:'Zen Maru Gothic',sans-serif; cursor:pointer;
  }
  .btn-gold{ background:var(--gold); color:#1c1400; }
  .btn-teal{ background:var(--teal); color:#04211d; }
  .btn-orange{ background:var(--orange); color:#2a1600; }
  .btn-ghost{ background:transparent; color:var(--muted); border:1px solid #2c3f63; flex:0 0 auto; padding:18px 22px; }
  .btn-primary{ background:var(--gold); color:#1c1400; width:100%; }
  .ov-error{ color:var(--red); font-size:15px; margin-top:10px; min-height:20px; }
  .ov-note{ background:#0f1a30; border-radius:12px; padding:14px 16px; font-size:15px; color:var(--paper); margin-top:16px; line-height:1.7; }
  .ov-note.warn{ border-left:4px solid var(--orange); }
  .ov-result{ text-align:center; }
  .ov-result .name{ font-family:'Zen Maru Gothic',sans-serif; font-weight:700; font-size:28px; }
  .ov-result .time{ color:var(--muted); font-size:16px; margin-top:8px; }
  .ov-result .msg{ font-size:16px; margin-top:16px; line-height:1.8; color:var(--paper); }
  .ov-result.ok .name{ color:var(--gold); }
  .ov-result.late .name{ color:var(--orange); }
  .ov-result.checkout .name{ color:var(--teal); }
  .ov-result.error .name{ color:var(--red); }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">スマイルスタディ<span id="branch-label">出退勤</span></div>
    <div class="clock" id="clock">--:--:--</div>
  </header>
  <main>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <div id="frame" class="pulse">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
    </div>
    <div id="camera-error"><div id="camera-error-msg">カメラを起動できませんでした。<br>タブレットの設定でカメラの許可を確認してください。</div></div>
    <div id="overlay">
      <div class="card">
        <div class="ov-teacher" id="ov-teacher"></div>
        <div class="ov-body" id="ov-body"></div>
      </div>
    </div>
  </main>
  <footer>
    <div id="status">QRコードを枠の中にかざしてください</div>
    <div id="debug"></div>
    <div id="settings-link">&#9881; 設定</div>
  </footer>
</div>
<script>
'use strict';
// =====================================================================
// 設定はこのファイルには書きません。
// Webhook URLと校舎名は、初回起動時の「初期設定」画面で入力してもらい、
// この端末のlocalStorageにだけ保存されます。
// （URLやファイルに書かないので、このファイルはGitHub等に公開しても安全です）
// =====================================================================
const STORAGE_KEY_WEBHOOK = 'smilestudy_webhook_url';
const STORAGE_KEY_BRANCH = 'smilestudy_branch_name';
let WEBHOOK_URL = '';
let BRANCH_NAME = '';

// 遅刻の判定しきい値（分）。5分以内は代講なし。
const LATE_THRESHOLD_MIN = 5;

// 講師向けランダムメッセージ
const CHECKIN_MESSAGES = [
  '今日もよろしくお願いします！',
  '今日も生徒様の小さな前進を大切にしていきましょう！',
  '困ったことがあれば早めに共有してください！'
];
const CHECKOUT_MESSAGES = [
  '本日もありがとうございました！気をつけてお帰りください。',
  '今日も一日お疲れ様でした！',
  '退勤を記録しました。次回もよろしくお願いします！'
];
const LATE_ADMIN_MESSAGE =
  '遅刻内容を記録しました。\n業務に入る前に、運営管理者へ一度状況を説明し、対応内容の確認を受けてから業務に入ってください。';

function pickRandom(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

// 実施コマ数に応じて必要な休憩時間（分）の下限を返す
// 2コマ→10 / 3コマ→20 / 4コマ→30 / 5コマ→45 / 6コマ以上→60（0〜1コマは0）
function requiredBreakMinutes(lessons){
  if (lessons >= 6) return 60;
  if (lessons >= 5) return 45;
  if (lessons >= 4) return 30;
  if (lessons >= 3) return 20;
  if (lessons >= 2) return 10;
  return 0;
}

// ----- DOM参照 -----
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const statusEl = document.getElementById('status');
const debugEl = document.getElementById('debug');
const frameEl = document.getElementById('frame');
const cameraErrorEl = document.getElementById('camera-error');
const cameraErrorMsgEl = document.getElementById('camera-error-msg');
const overlayEl = document.getElementById('overlay');
const ovTeacherEl = document.getElementById('ov-teacher');
const ovBodyEl = document.getElementById('ov-body');

// ----- 状態 -----
let scanning = false;
let cameraStarted = false;
let frameCount = 0;
let currentTeacher = null; // { id, name }
let scanTime = null;       // QRを読み取った瞬間のDate

// 遅刻フローの一時状態
let lateState = null; // { lateMinutes, lateResponse, substituteId, substituteName }

// ----- 時計 -----
function updateClock(){
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('ja-JP', {hour12:false});
}
setInterval(updateClock, 1000);
updateClock();

// =====================================================================
// カメラ・QRスキャン
// =====================================================================
async function startCamera(){
  if (typeof jsQR === 'undefined'){
    cameraErrorMsgEl.innerHTML = 'QR読み取りライブラリの読み込みに失敗しました。<br>インターネット接続を確認して、ページを再読み込みしてください。';
    cameraErrorEl.style.display = 'flex';
    debugEl.textContent = 'エラー：jsQRライブラリ未読み込み';
    return;
  }
  if (cameraStarted){
    scanning = true;
    return;
  }
  const attempts = [
    { video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } } },
    { video: { facingMode: 'environment' } },
    { video: true } // 最後の手段：使えるカメラを何でも使う
  ];
  let lastErr = null;
  for (const constraints of attempts){
    try{
      const stream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = stream;
      await video.play();
      cameraStarted = true;
      scanning = true;
      frameCount = 0;
      debugEl.textContent = 'カメラ起動OK。QRを探しています…';
      requestAnimationFrame(tick);
      return;
    } catch(err){
      lastErr = err;
    }
  }
  cameraErrorEl.style.display = 'flex';
  debugEl.textContent = 'カメラ起動エラー：' + (lastErr ? (lastErr.name + ' ' + lastErr.message) : '不明');
}

function tick(){
  if (video.readyState === video.HAVE_ENOUGH_DATA && scanning){
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'attemptBoth' });
    frameCount++;
    if (frameCount % 30 === 0){
      debugEl.textContent = 'スキャン中… (' + video.videoWidth + 'x' + video.videoHeight + ' / ' + frameCount + 'フレーム)';
    }
    if (code && code.data) handleScan(code.data);
  }
  requestAnimationFrame(tick);
}

function handleScan(data){
  scanning = false;
  frameEl.classList.remove('pulse');
  let parsed = null;
  try { parsed = JSON.parse(data); } catch(e) { parsed = null; }
  if (!parsed || !parsed.id || !parsed.name){
    showErrorScreen('QRコードの形式が正しくありません');
    return;
  }
  currentTeacher = parsed;
  scanTime = new Date();
  lateState = null;
  showChoose();
}

// =====================================================================
// 画面: 初期設定（Webhook URL・校舎名をこの端末に保存）
// =====================================================================
function showSetupForm(){
  const existingWebhook = localStorage.getItem(STORAGE_KEY_WEBHOOK) || '';
  const existingBranch = localStorage.getItem(STORAGE_KEY_BRANCH) || '春日部校';
  scanning = false;
  ovTeacherEl.textContent = '初期設定';
  ovBodyEl.innerHTML = `
    <label class="ov-label">Webhook URL（Apps ScriptのウェブアプリURL）</label>
    <input type="text" class="ov-input" id="in-webhook" placeholder="https://script.google.com/macros/s/.../exec" style="font-size:14px;">
    <label class="ov-label">校舎名</label>
    <input type="text" class="ov-input" id="in-branch">
    <div class="ov-error" id="err-setup"></div>
    <div class="ov-actions">
      <button class="btn btn-primary" id="btn-save-setup">保存してはじめる</button>
    </div>
  `;
  // 値はinnerHTMLに直接埋め込まず、プロパティ経由でセット（HTML崩れ防止）
  document.getElementById('in-webhook').value = existingWebhook;
  document.getElementById('in-branch').value = existingBranch;
  openOverlay();
  document.getElementById('btn-save-setup').onclick = () => {
    const webhook = document.getElementById('in-webhook').value.trim();
    const branch = document.getElementById('in-branch').value.trim();
    if (!webhook.startsWith('https://')){
      document.getElementById('err-setup').textContent = 'Webhook URLが正しくありません（https://で始まるURLを入力してください）';
      return;
    }
    if (!branch){
      document.getElementById('err-setup').textContent = '校舎名を入力してください';
      return;
    }
    localStorage.setItem(STORAGE_KEY_WEBHOOK, webhook);
    localStorage.setItem(STORAGE_KEY_BRANCH, branch);
    applyConfig(webhook, branch);
    closeOverlay();
    startCamera();
  };
}
function applyConfig(webhook, branch){
  WEBHOOK_URL = webhook;
  BRANCH_NAME = branch;
  document.getElementById('branch-label').textContent = BRANCH_NAME + ' 出退勤';
}

// =====================================================================
// 画面: 出勤 / 遅刻 / 退勤 の選択
// =====================================================================
function showChoose(){
  ovTeacherEl.textContent = currentTeacher.name + ' 先生';
  ovBodyEl.innerHTML = `
    <div style="text-align:center;color:var(--muted);margin-bottom:6px;">読み取り時刻 ${fmtTime(scanTime)}</div>
    <div style="text-align:center;">本日の打刻を選んでください</div>
    <div class="ov-actions">
      <button class="btn btn-gold" id="btn-checkin">出勤</button>
      <button class="btn btn-orange" id="btn-late">遅刻</button>
      <button class="btn btn-teal" id="btn-checkout">退勤</button>
    </div>
    <div class="ov-actions">
      <button class="btn btn-ghost" id="btn-cancel-choose">キャンセル</button>
    </div>
  `;
  openOverlay();
  document.getElementById('btn-checkin').onclick = showCheckinForm;
  document.getElementById('btn-late').onclick = showLateMinutesForm;
  document.getElementById('btn-checkout').onclick = showCheckoutForm;
  document.getElementById('btn-cancel-choose').onclick = resetToIdle;
}

// =====================================================================
// 画面: 出勤フォーム（業務開始時間 — QR読み取り時刻より後のみ）
// =====================================================================
function showCheckinForm(){
  const minHHMM = toHHMM(scanTime);
  ovTeacherEl.textContent = currentTeacher.name + ' 先生（出勤）';
  ovBodyEl.innerHTML = `
    <label class="ov-label">業務開始時間（読み取り時刻 ${fmtTime(scanTime)} より後の時間のみ）</label>
    <input type="time" class="ov-input" id="in-start" value="${minHHMM}" min="${minHHMM}">
    <div class="ov-error" id="err-start"></div>
    <div class="ov-actions">
      <button class="btn btn-ghost" id="btn-cancel">キャンセル</button>
      <button class="btn btn-primary" id="btn-submit">登録する</button>
    </div>
  `;
  document.getElementById('btn-cancel').onclick = resetToIdle;
  document.getElementById('btn-submit').onclick = () => {
    const hhmm = document.getElementById('in-start').value;
    if (!hhmm){
      document.getElementById('err-start').textContent = '時間を入力してください';
      return;
    }
    const workStart = combineTodayTime(hhmm);
    if (workStart < scanTime){
      document.getElementById('err-start').textContent = '読み取り時刻より後の時間を入力してください';
      return;
    }
    submitCheckin(workStart);
  };
}

// =====================================================================
// 遅刻フロー ①: 遅刻分を数値入力
// =====================================================================
function showLateMinutesForm(){
  ovTeacherEl.textContent = currentTeacher.name + ' 先生（遅刻）';
  ovBodyEl.innerHTML = `
    <label class="ov-label">遅刻分（授業開始時刻から何分遅れたか）</label>
    <input type="number" class="ov-input" id="in-late-min" min="1" step="1" inputmode="numeric" placeholder="例：3">
    <div class="ov-error" id="err-late-min"></div>
    <div class="ov-actions">
      <button class="btn btn-ghost" id="btn-cancel">キャンセル</button>
      <button class="btn btn-primary" id="btn-next">次へ</button>
    </div>
  `;
  document.getElementById('btn-cancel').onclick = resetToIdle;
  document.getElementById('btn-next').onclick = () => {
    const val = parseInt(document.getElementById('in-late-min').value, 10);
    if (isNaN(val) || val <= 0){
      document.getElementById('err-late-min').textContent = '1以上の数値を入力してください';
      return;
    }
    lateState = { lateMinutes: val, lateResponse: null, substituteId: null, substituteName: null };
    // GAS側と同じ判定ロジックをフロントでも実施（表示・分岐用）
    if (val <= LATE_THRESHOLD_MIN){
      // 5分以内：代講なし。追加入力なしで業務開始時間へ
      showLateStartForm();
    } else {
      // 5分超：遅刻時対応を選択
      showLateResponseForm();
    }
  };
}

// =====================================================================
// 遅刻フロー ②(5分超のみ): 遅刻時対応を選択
// =====================================================================
function showLateResponseForm(){
  ovBodyEl.innerHTML = `
    <div class="ov-note warn">遅刻 ${lateState.lateMinutes} 分（5分超）です。対応を選択してください。</div>
    <label class="ov-label">遅刻時対応</label>
    <div class="ov-actions stack">
      <button class="btn btn-orange" data-resp="代講対応">代講対応</button>
      <button class="btn btn-orange" data-resp="同日延長">同日延長</button>
      <button class="btn btn-orange" data-resp="別日補填予定">別日補填予定</button>
    </div>
    <div class="ov-error" id="err-late-resp"></div>
    <div class="ov-actions">
      <button class="btn btn-ghost" id="btn-cancel">キャンセル</button>
    </div>
  `;
  document.getElementById('btn-cancel').onclick = resetToIdle;
  ovBodyEl.querySelectorAll('[data-resp]').forEach(btn => {
    btn.onclick = () => {
      lateState.lateResponse = btn.getAttribute('data-resp');
      if (lateState.lateResponse === '代講対応'){
        showSubstituteForm();
      } else {
        lateState.substituteId = null;
        lateState.substituteName = null;
        showLateStartForm();
      }
    };
  });
}

// =====================================================================
// 遅刻フロー ③(代講対応のみ): 代講者を講師一覧DBから選択
// =====================================================================
async function showSubstituteForm(){
  ovBodyEl.innerHTML = `<div style="text-align:center;color:var(--muted);">講師一覧を読み込んでいます…</div>`;
  let teachers = [];
  try{
    const json = await jsonpRequest({ type: 'teachers', teacherId: currentTeacher.id });
    if (!json || !json.ok){
      throw new Error((json && json.message) || '講師一覧の取得に失敗しました');
    }
    teachers = json.teachers || [];
  } catch(err){
    ovBodyEl.innerHTML = `
      <div class="ov-error">${escapeHtml(err.message || '講師一覧の取得に失敗しました')}</div>
      <div class="ov-actions">
        <button class="btn btn-ghost" id="btn-cancel">キャンセル</button>
        <button class="btn btn-primary" id="btn-retry">再試行</button>
      </div>
    `;
    document.getElementById('btn-cancel').onclick = resetToIdle;
    document.getElementById('btn-retry').onclick = showSubstituteForm;
    return;
  }

  // 本人はサーバー側で除外済みだが、念のためフロントでも除外
  teachers = teachers.filter(t => t.id && t.name);

  if (teachers.length === 0){
    ovBodyEl.innerHTML = `
      <div class="ov-error">選択できる代講者がいません（本人以外の講師が見つかりません）</div>
      <div class="ov-actions">
        <button class="btn btn-ghost" id="btn-cancel">キャンセル</button>
      </div>
    `;
    document.getElementById('btn-cancel').onclick = resetToIdle;
    return;
  }

  const options = teachers.map(t => `<option value="${escapeHtml(t.id)}">${escapeHtml(t.name)}</option>`).join('');
  ovBodyEl.innerHTML = `
    <div class="ov-note warn">代講対応：代講した講師を選択してください（本人は選べません）。</div>
    <label class="ov-label">代講者</label>
    <select class="ov-input" id="in-substitute">
      <option value="">選択してください</option>
      ${options}
    </select>
    <div class="ov-error" id="err-substitute"></div>
    <div class="ov-actions">
      <button class="btn btn-ghost" id="btn-cancel">キャンセル</button>
      <button class="btn btn-primary" id="btn-next">次へ</button>
    </div>
  `;
  document.getElementById('btn-cancel').onclick = resetToIdle;
  document.getElementById('btn-next').onclick = () => {
    const sel = document.getElementById('in-substitute');
    const id = sel.value;
    if (!id){
      document.getElementById('err-substitute').textContent = '代講者を選択してください';
      return;
    }
    lateState.substituteId = id;
    lateState.substituteName = sel.options[sel.selectedIndex].text;
    showLateStartForm();
  };
}

// =====================================================================
// 遅刻フロー ④: 業務開始時間を入力して登録
// =====================================================================
function showLateStartForm(){
  const minHHMM = toHHMM(scanTime);
  let summary = `遅刻 ${lateState.lateMinutes} 分`;
  if (lateState.lateMinutes <= LATE_THRESHOLD_MIN){
    summary += '（5分以内｜代講なし）';
  } else {
    summary += `｜${escapeHtml(lateState.lateResponse)}`;
    if (lateState.substituteName) summary += `（代講者：${escapeHtml(lateState.substituteName)}）`;
  }
  ovBodyEl.innerHTML = `
    <div class="ov-note">${summary}</div>
    <label class="ov-label">業務開始時間（読み取り時刻 ${fmtTime(scanTime)} より後の時間のみ）</label>
    <input type="time" class="ov-input" id="in-start" value="${minHHMM}" min="${minHHMM}">
    <div class="ov-error" id="err-start"></div>
    <div class="ov-actions">
      <button class="btn btn-ghost" id="btn-cancel">キャンセル</button>
      <button class="btn btn-primary" id="btn-submit">登録する</button>
    </div>
  `;
  document.getElementById('btn-cancel').onclick = resetToIdle;
  document.getElementById('btn-submit').onclick = () => {
    const hhmm = document.getElementById('in-start').value;
    if (!hhmm){
      document.getElementById('err-start').textContent = '時間を入力してください';
      return;
    }
    const workStart = combineTodayTime(hhmm);
    if (workStart < scanTime){
      document.getElementById('err-start').textContent = '読み取り時刻より後の時間を入力してください';
      return;
    }
    submitLate(workStart);
  };
}

// =====================================================================
// 画面: 退勤フォーム（業務終了時間 — QR読み取り時刻より前のみ、
//        実施コマ数・休憩時間・Comiru報告書チェック）
// =====================================================================
function showCheckoutForm(){
  const maxHHMM = toHHMM(scanTime);
  ovTeacherEl.textContent = currentTeacher.name + ' 先生（退勤）';
  ovBodyEl.innerHTML = `
    <label class="ov-label">業務終了時間（読み取り時刻 ${fmtTime(scanTime)} より前の時間のみ）</label>
    <input type="time" class="ov-input" id="in-end" value="${maxHHMM}" max="${maxHHMM}">
    <div class="ov-error" id="err-end"></div>
    <label class="ov-label">実施コマ数</label>
    <input type="number" class="ov-input" id="in-lessons" min="0" step="1" value="0" inputmode="numeric">
    <label class="ov-label">休憩時間（分）</label>
    <input type="number" class="ov-input" id="in-break" min="0" step="5" value="0" inputmode="numeric">
    <label class="ov-check">
      <input type="checkbox" id="in-comiru">
      Comiru報告書を提出済み
    </label>
    <div class="ov-actions">
      <button class="btn btn-ghost" id="btn-cancel">キャンセル</button>
      <button class="btn btn-primary" id="btn-submit">登録する</button>
    </div>
  `;
  document.getElementById('btn-cancel').onclick = resetToIdle;
  document.getElementById('btn-submit').onclick = () => {
    const hhmm = document.getElementById('in-end').value;
    if (!hhmm){
      document.getElementById('err-end').textContent = '時間を入力してください';
      return;
    }
    const workEnd = combineTodayTime(hhmm);
    const lessons = parseInt(document.getElementById('in-lessons').value, 10);
    const breakMin = parseInt(document.getElementById('in-break').value, 10);
    const comiruDone = document.getElementById('in-comiru').checked;
    if (workEnd > scanTime){
      document.getElementById('err-end').textContent = '読み取り時刻より前の時間を入力してください';
      return;
    }
    if (isNaN(lessons) || lessons < 0 || isNaN(breakMin) || breakMin < 0){
      document.getElementById('err-end').textContent = 'コマ数・休憩時間は0以上の数値で入力してください';
      return;
    }
    const reqBreak = requiredBreakMinutes(lessons);
    if (breakMin < reqBreak){
      document.getElementById('err-end').textContent =
        `${lessons}コマの場合、休憩は${reqBreak}分以上必要です（現在${breakMin}分）。休憩を取得のうえ入力してください。`;
      return;
    }
    submitCheckout(workEnd, lessons, breakMin, comiruDone);
  };
}

// =====================================================================
// 通信（JSONP）
// Apps ScriptのWeb Appは、ブラウザからのfetch(POST)だとCORSでブロックされる
// 仕様のため、<script>タグ経由のJSONP（GET）で通信します。
// =====================================================================
function jsonpRequest(params){
  return new Promise((resolve, reject) => {
    const callbackName = 'jsonp_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
    const script = document.createElement('script');
    const timeoutId = setTimeout(() => {
      cleanup();
      reject(new Error('タイムアウトしました'));
    }, 20000);
    function cleanup(){
      clearTimeout(timeoutId);
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    window[callbackName] = (data) => {
      cleanup();
      resolve(data);
    };
    const query = new URLSearchParams(Object.assign({}, params, { callback: callbackName })).toString();
    script.src = WEBHOOK_URL + '?' + query;
    script.onerror = () => {
      cleanup();
      reject(new Error('Webhookへの接続に失敗しました。設定のURLを確認してください'));
    };
    document.body.appendChild(script);
  });
}

async function submitCheckin(workStart){
  ovBodyEl.innerHTML = `<div style="text-align:center;color:var(--muted);">登録しています…</div>`;
  try{
    const json = await jsonpRequest({
      type: 'checkin',
      teacherId: currentTeacher.id,
      teacherName: currentTeacher.name,
      branch: BRANCH_NAME,
      scanTime: scanTime.toISOString(),
      workStartTime: workStart.toISOString()
    });
    showResult(json, 'checkin');
  } catch(err){
    showResult({ ok:false, message: err.message || '通信エラーです。もう一度お試しください。' });
  }
}

async function submitLate(workStart){
  ovBodyEl.innerHTML = `<div style="text-align:center;color:var(--muted);">登録しています…</div>`;
  try{
    const params = {
      type: 'late',
      teacherId: currentTeacher.id,
      teacherName: currentTeacher.name,
      branch: BRANCH_NAME,
      scanTime: scanTime.toISOString(),
      workStartTime: workStart.toISOString(),
      lateMinutes: String(lateState.lateMinutes)
    };
    // 5分超のみ対応・代講者を送る（5分以内は遅刻分のみ）
    if (lateState.lateMinutes > LATE_THRESHOLD_MIN){
      params.lateResponse = lateState.lateResponse || '';
      if (lateState.lateResponse === '代講対応' && lateState.substituteId){
        params.substituteId = lateState.substituteId;
      }
    }
    const json = await jsonpRequest(params);
    showResult(json, 'late');
  } catch(err){
    showResult({ ok:false, message: err.message || '通信エラーです。もう一度お試しください。' });
  }
}

async function submitCheckout(workEnd, lessons, breakMin, comiruDone){
  ovBodyEl.innerHTML = `<div style="text-align:center;color:var(--muted);">登録しています…</div>`;
  try{
    const json = await jsonpRequest({
      type: 'checkout',
      teacherId: currentTeacher.id,
      teacherName: currentTeacher.name,
      branch: BRANCH_NAME,
      scanTime: scanTime.toISOString(),
      workEndTime: workEnd.toISOString(),
      lessonCount: String(lessons),
      breakMinutes: String(breakMin),
      comiruDone: String(comiruDone)
    });
    showResult(json, 'checkout');
  } catch(err){
    showResult({ ok:false, message: err.message || '通信エラーです。もう一度お試しください。' });
  }
}

// =====================================================================
// 画面: 結果表示
// =====================================================================
function showResult(json, kind){
  ovTeacherEl.textContent = '';
  if (json && json.ok){
    if (kind === 'late'){
      // 遅刻：運営管理者への確認メッセージを必ず表示
      ovBodyEl.innerHTML = `
        <div class="ov-result late">
          <div class="name">${escapeHtml(json.name)} 先生 遅刻を記録しました</div>
          <div class="time">${fmtTime(new Date(json.time))}</div>
          <div class="msg">${escapeHtml(LATE_ADMIN_MESSAGE).replace(/\n/g,'<br>')}</div>
        </div>
      `;
      // 遅刻は確認を促すため、少し長めに表示
      setTimeout(resetToIdle, 6500);
      return;
    }
    const cls = kind === 'checkout' ? 'checkout' : 'ok';
    const verb = kind === 'checkout' ? '退勤' : '出勤';
    const msg = kind === 'checkout' ? pickRandom(CHECKOUT_MESSAGES) : pickRandom(CHECKIN_MESSAGES);
    ovBodyEl.innerHTML = `
      <div class="ov-result ${cls}">
        <div class="name">${escapeHtml(json.name)} 先生 ${verb}しました</div>
        <div class="time">${fmtTime(new Date(json.time))}</div>
        <div class="msg">${escapeHtml(msg)}</div>
      </div>
    `;
    setTimeout(resetToIdle, 3600);
  } else {
    ovBodyEl.innerHTML = `
      <div class="ov-result error">
        <div class="name">エラー</div>
        <div class="time">${escapeHtml((json && json.message) || '登録に失敗しました')}</div>
      </div>
    `;
    setTimeout(resetToIdle, 3600);
  }
}

function showErrorScreen(message){
  ovTeacherEl.textContent = '';
  ovBodyEl.innerHTML = `
    <div class="ov-result error">
      <div class="name">エラー</div>
      <div class="time">${escapeHtml(message)}</div>
    </div>
  `;
  openOverlay();
  setTimeout(resetToIdle, 2600);
}

// =====================================================================
// 共通
// =====================================================================
function openOverlay(){ overlayEl.classList.add('show'); }
function closeOverlay(){ overlayEl.classList.remove('show'); }
function resetToIdle(){
  closeOverlay();
  currentTeacher = null;
  scanTime = null;
  lateState = null;
  statusEl.textContent = 'QRコードを枠の中にかざしてください';
  frameEl.classList.add('pulse');
  scanning = true;
}
function toHHMM(date){
  const h = String(date.getHours()).padStart(2,'0');
  const m = String(date.getMinutes()).padStart(2,'0');
  return h + ':' + m;
}
function combineTodayTime(hhmm){
  const parts = hhmm.split(':');
  const d = new Date();
  d.setHours(Number(parts[0]), Number(parts[1]), 0, 0);
  return d;
}
function fmtTime(date){
  return date.toLocaleTimeString('ja-JP', {hour12:false});
}
function escapeHtml(str){
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

// =====================================================================
// 起動処理
// =====================================================================
document.getElementById('settings-link').onclick = () => {
  showSetupForm();
};
const savedWebhook = localStorage.getItem(STORAGE_KEY_WEBHOOK);
const savedBranch = localStorage.getItem(STORAGE_KEY_BRANCH);
if (savedWebhook && savedBranch){
  applyConfig(savedWebhook, savedBranch);
  startCamera();
} else {
  showSetupForm();
}
</script>
