<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>１対１スマイルスタディ 出退勤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<style>
  :root{
    --bg:#12203a;
    --paper:#f5f1e8;
    --gold:#f2b705;
    --teal:#4fb6a8;
    --red:#e4572e;
    --orange:#e8862e;
    --muted:#8fa0c2;
    --panel:#1b2c4d;
  }
  *{box-sizing:border-box;}
  html,body{
    margin:0;height:100%;
    background:var(--bg);
    color:var(--paper);
    font-family:'Noto Sans JP',sans-serif;
    overflow:hidden;
    -webkit-user-select:none;user-select:none;
  }
  #app{ position:relative; height:100vh; display:flex; flex-direction:column; }
  header{
    padding:24px 32px 12px;
    display:flex; justify-content:space-between; align-items:baseline;
    position:relative; z-index:2;
  }
  header .brand{ font-family:'Zen Maru Gothic',sans-serif; font-weight:700; font-size:22px; letter-spacing:.02em; }
  header .brand span{ display:block; font-size:14px; font-weight:500; color:var(--muted); margin-top:4px; }
  header .clock{ font-variant-numeric:tabular-nums; color:var(--muted); font-size:16px; }
  main{ flex:1; position:relative; display:flex; align-items:center; justify-content:center; }
  video{ position:absolute; inset:0; width:100%; height:100%; object-fit:cover; filter:brightness(.7); }
  #frame{ position:relative; width:min(60vmin,420px); height:min(60vmin,420px); z-index:2; }
  .corner{ position:absolute; width:44px; height:44px; border:4px solid var(--gold); opacity:.9; }
  .corner.tl{top:0;left:0;border-right:none;border-bottom:none;border-radius:12px 0 0 0;}
  .corner.tr{top:0;right:0;border-left:none;border-bottom:none;border-radius:0 12px 0 0;}
  .corner.bl{bottom:0;left:0;border-right:none;border-top:none;border-radius:0 0 0 12px;}
  .corner.br{bottom:0;right:0;border-left:none;border-top:none;border-radius:0 0 12px 0;}
  #frame.pulse .corner{ animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse{ 0%,100%{opacity:.5;} 50%{opacity:1;} }
  footer{ padding:28px 24px 40px; text-align:center; position:relative; z-index:2; }
  #status{ font-size:20px; color:var(--muted); }
  #debug{ font-size:12px; color:#5b6c8f; margin-top:6px; min-height:16px; }
  #cam-switch{
    margin-top:14px; background:transparent; border:1px solid #2c3f63; color:var(--paper);
    border-radius:10px; padding:9px 18px; font-size:14px; cursor:pointer;
    font-family:'Noto Sans JP',sans-serif;
  }
  #settings-link{ font-size:12px; color:#3d4d70; margin-top:12px; cursor:pointer; }
  #camera-error{ display:none; position:absolute; inset:0; background:var(--bg); z-index:5; align-items:center; justify-content:center; text-align:center; padding:40px; font-size:18px; color:var(--muted); }
  /* ===== オーバーレイ（設定・選択・入力・結果画面） ===== */
  #overlay{
    position:absolute; inset:0; z-index:10;
    display:none;
    align-items:center; justify-content:center;
    background:rgba(10,16,32,.78);
    backdrop-filter:blur(2px);
  }
  #overlay.show{ display:flex; }
  .card{
    width:min(90vw,520px);
    max-height:88vh; overflow-y:auto;
    background:var(--panel);
    border-radius:24px;
    padding:36px 32px;
    box-shadow:0 20px 60px rgba(0,0,0,.4);
  }
  .ov-teacher{ font-family:'Zen Maru Gothic',sans-serif; font-weight:700; font-size:28px; text-align:center; margin-bottom:18px; }
  .ov-body{ font-size:17px; color:var(--paper); line-height:1.7; }
  .ov-label{ display:block; font-size:14px; color:var(--muted); margin:18px 0 6px; }
  .ov-input{
    width:100%; padding:16px; font-size:22px; border-radius:12px; border:none;
    background:#0f1a30; color:var(--paper); font-variant-numeric:tabular-nums;
  }
  .ov-input:focus{ outline:2px solid var(--gold); }
  select.ov-input{ font-size:18px; }
  /* タップでホイールを開く表示フィールド（時間・数値 共通） */
  .tapfield{
    width:100%; padding:16px; font-size:26px; border-radius:12px; border:none;
    background:#0f1a30; color:var(--paper); font-variant-numeric:tabular-nums;
    display:flex; align-items:center; justify-content:space-between; cursor:pointer;
  }
  .tapfield .tf-ico{ font-size:15px; color:var(--muted); }
  .ov-check{ display:flex; align-items:center; gap:10px; margin-top:20px; font-size:16px; }
  .ov-check input{ width:22px; height:22px; }
  .ov-actions{ display:flex; gap:12px; margin-top:26px; }
  .ov-actions.stack{ flex-direction:column; }
  .btn{
    flex:1; padding:18px; border:none; border-radius:14px; font-size:18px; font-weight:700;
    font-family:'Zen Maru Gothic',sans-serif; cursor:pointer;
  }
  .btn-gold{ background:var(--gold); color:#1c1400; }
  .btn-teal{ background:var(--teal); color:#04211d; }
  .btn-orange{ background:var(--orange); color:#2a1600; }
  .btn-ghost{ background:transparent; color:var(--muted); border:1px solid #2c3f63; flex:0 0 auto; padding:18px 22px; }
  .btn-primary{ background:var(--gold); color:#1c1400; width:100%; }
  .ov-error{ color:var(--red); font-size:15px; margin-top:10px; min-height:20px; }
  .ov-note{ background:#0f1a30; border-radius:12px; padding:14px 16px; font-size:15px; color:var(--paper); margin-top:16px; line-height:1.7; }
  .ov-note.warn{ border-left:4px solid var(--orange); }
  .ov-result{ text-align:center; }
  .ov-result .name{ font-family:'Zen Maru Gothic',sans-serif; font-weight:700; font-size:28px; }
  .ov-result .time{ color:var(--muted); font-size:16px; margin-top:8px; }
  .ov-result .msg{ font-size:16px; margin-top:16px; line-height:1.8; color:var(--paper); }
  .ov-result.ok .name{ color:var(--gold); }
  .ov-result.late .name{ color:var(--orange); }
  .ov-result.checkout .name{ color:var(--teal); }
  .ov-result.error .name{ color:var(--red); }
  /* ===== スクロール式ホイールピッカー（時間・数値 共通） ===== */
  #wheel{
    position:fixed; inset:0; z-index:30; display:none;
    align-items:flex-end; justify-content:center;
    background:rgba(10,16,32,.6);
  }
  #wheel.show{ display:flex; }
  .wheel-sheet{
    width:min(94vw,440px); background:var(--panel);
    border-radius:24px 24px 0 0; padding:20px 22px 26px;
    box-shadow:0 -12px 40px rgba(0,0,0,.4);
  }
  .wheel-title{ text-align:center; color:var(--muted); font-size:14px; margin-bottom:12px; }
  .wheel-cols{ position:relative; display:flex; justify-content:center; align-items:center; gap:14px; height:208px; }
  .wheel-highlight{
    position:absolute; left:0; right:0; top:calc(50% - 26px); height:52px;
    border-top:1px solid #3a4d75; border-bottom:1px solid #3a4d75;
    background:rgba(242,183,5,.06); border-radius:8px; pointer-events:none;
  }
  .wheel-col{
    height:208px; width:92px; overflow-y:scroll;
    scroll-snap-type:y mandatory; text-align:center;
    -ms-overflow-style:none; scrollbar-width:none;
  }
  .wheel-col::-webkit-scrollbar{ display:none; }
  .wheel-col .pad{ height:78px; }
  .wheel-item{
    height:52px; line-height:52px; font-size:30px; scroll-snap-align:center;
    color:#5f7099; font-variant-numeric:tabular-nums; transition:color .12s,transform .12s;
  }
  .wheel-item.sel{ color:var(--paper); font-weight:700; transform:scale(1.12); }
  .wheel-colon,.wheel-unit{ font-size:26px; color:var(--paper); }
  .wheel-unit{ font-size:20px; color:var(--muted); }
  .wheel-actions{ display:flex; gap:12px; margin-top:18px; }
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="brand">スマイルスタディ<span id="branch-label">出退勤</span></div>
    <div class="clock" id="clock">--:--:--</div>
  </header>
  <main>
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas" style="display:none;"></canvas>
    <div id="frame" class="pulse">
      <div class="corner tl"></div><div class="corner tr"></div>
      <div class="corner bl"></div><div class="corner br"></div>
    </div>
    <div id="camera-error"><div id="camera-error-msg">カメラを起動できませんでした。<br>タブレットの設定でカメラの許可を確認してください。</div></div>
    <div id="overlay">
      <div class="card">
        <div class="ov-teacher" id="ov-teacher"></div>
        <div class="ov-body" id="ov-body"></div>
      </div>
    </div>
    <!-- スクロール式ホイールピッカー（時間・数値 共通） -->
    <div id="wheel">
      <div class="wheel-sheet">
        <div class="wheel-title" id="wheel-title">選択</div>
        <div class="wheel-cols" id="wheel-cols"></div>
        <div class="wheel-actions">
          <button class="btn btn-ghost" id="wheel-cancel" style="flex:1;">キャンセル</button>
          <button class="btn btn-primary" id="wheel-confirm">決定</button>
        </div>
      </div>
    </div>
  </main>
  <footer>
    <div id="status">QRコードを枠の中にかざしてください</div>
    <div id="debug"></div>
    <button id="cam-switch">&#128247; カメラ切替</button>
    <div id="settings-link">&#9881; 設定</div>
  </footer>
</div>
<script>
'use strict';
// =====================================================================
// 設定はこのファイルには書きません。
// Webhook URLと校舎名は、初回起動時の「初期設定」画面で入力してもらい、
// この端末のlocalStorageにだけ保存されます。
// =====================================================================
const STORAGE_KEY_WEBHOOK = 'smilestudy_webhook_url';
const STORAGE_KEY_BRANCH = 'smilestudy_branch_name';
const STORAGE_KEY_FACING = 'smilestudy_camera_facing'; // 'environment'（外カメ） or 'user'（内カメ）
let WEBHOOK_URL = '';
let BRANCH_NAME = '';
let CAMERA_FACING = localStorage.getItem(STORAGE_KEY_FACING) || 'environment';
// 遅刻の判定しきい値（分）。5分以内は代講なし。
const LATE_THRESHOLD_MIN = 5;
// 講師向けランダムメッセージ
const CHECKIN_MESSAGES = [
  '今日もよろしくお願いします！',
  '今日も生徒様の小さな前進を大切にしていきましょう！',
  '困ったことがあれば早めに共有してください！'
];
const CHECKOUT_MESSAGES = [
  '本日もありがとうございました！気をつけてお帰りください。',
  '今日も一日お疲れ様でした！',
  '退勤を記録しました。次回もよろしくお願いします！'
];
const LATE_ADMIN_MESSAGE =
  '遅刻内容を記録しました。\n業務に入る前に、運営管理者へ一度状況を説明し、対応内容の確認を受けてから業務に入ってください。';
function pickRandom(arr){ return arr[Math.floor(Math.random() * arr.length)]; }
// 実施コマ数に応じて必要な休憩時間（分）の下限を返す
function requiredBreakMinutes(lessons){
  if (lessons >= 6) return 60;
  if (lessons >= 5) return 45;
  if (lessons >= 4) return 30;
  if (lessons >= 3) return 20;
  if (lessons >= 2) return 10;
  return 0;
}
// ----- DOM参照 -----
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const statusEl = document.getElementById('status');
const debugEl = document.getElementById('debug');
const frameEl = document.getElementById('frame');
const cameraErrorEl = document.getElementById('camera-error');
const cameraErrorMsgEl = document.getElementById('camera-error-msg');
const overlayEl = document.getElementById('overlay');
const ovTeacherEl = document.getElementById('ov-teacher');
const ovBodyEl = document.getElementById('ov-body');
const camSwitchEl = document.getElementById('cam-switch');
// ----- 状態 -----
let scanning = false;
let cameraStarted = false;
let frameCount = 0;
let currentTeacher = null; // { id, name }
let scanTime = null;       // QRを読み取った瞬間のDate
let lateState = null;      // { lateMinutes, lateResponse, substituteId, substituteName }
// ----- 時計 -----
function updateClock(){
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('ja-JP', {hour12:false});
}
setInterval(updateClock, 1000);
updateClock();
// =====================================================================
// スクロール式ホイールピッカー（汎用）
//   数字をスクロールして選び「決定」で確定します。
//   - 時間ピッカー: 時・分の2列
//   - 数値ピッカー: 1列（コマ数・休憩時間・遅刻分など）
// =====================================================================
const ITEM_H = 52;
const wheelEl = document.getElementById('wheel');
const wheelTitleEl = document.getElementById('wheel-title');
const wheelColsEl = document.getElementById('wheel-cols');
const wheelConfirmEl = document.getElementById('wheel-confirm');
const wheelCancelEl = document.getElementById('wheel-cancel');
function pad2(n){ return String(n).padStart(2,'0'); }
function hm2min(hhmm){ const p = hhmm.split(':'); return Number(p[0])*60 + Number(p[1]); }
function markWheelSel(col){
  const items = col.querySelectorAll('.wheel-item');
  let idx = Math.round(col.scrollTop / ITEM_H);
  idx = Math.max(0, Math.min(items.length - 1, idx));
  items.forEach(function(el, i){ el.classList.toggle('sel', i === idx); });
}
// cols: [{ values:[表示文字列...], initialIndex, unit(任意), sep(任意 既定':') }]
// onConfirm(indices[]) に各列の選択インデックスを渡す
function openWheel(title, cols, onConfirm){
  wheelTitleEl.textContent = title;
  let html = '<div class="wheel-highlight"></div>';
  cols.forEach(function(c, ci){
    html += '<div class="wheel-col"><div class="pad"></div>' +
            c.values.map(function(v){ return '<div class="wheel-item">' + v + '</div>'; }).join('') +
            '<div class="pad"></div></div>';
    if (c.unit){
      html += '<div class="wheel-unit">' + c.unit + '</div>';
    } else if (ci < cols.length - 1){
      html += '<div class="wheel-colon">' + (c.sep || ':') + '</div>';
    }
  });
  wheelColsEl.innerHTML = html;
  const colEls = wheelColsEl.querySelectorAll('.wheel-col');
  colEls.forEach(function(col){
    let t;
    col.addEventListener('scroll', function(){
      clearTimeout(t);
      t = setTimeout(function(){ markWheelSel(col); }, 50);
    });
  });
  wheelEl.classList.add('show');
  // 表示後にスクロール位置を設定（非表示中はscrollTopが効かないため）
  requestAnimationFrame(function(){
    colEls.forEach(function(col, ci){
      col.scrollTop = (cols[ci].initialIndex || 0) * ITEM_H;
      markWheelSel(col);
    });
  });
  wheelConfirmEl.onclick = function(){
    const idxs = Array.prototype.map.call(colEls, function(col){
      const n = col.querySelectorAll('.wheel-item').length;
      return Math.max(0, Math.min(n - 1, Math.round(col.scrollTop / ITEM_H)));
    });
    wheelEl.classList.remove('show');
    onConfirm(idxs);
  };
  wheelCancelEl.onclick = function(){ wheelEl.classList.remove('show'); };
}
// 時間ホイール（時・分）。min/max（HHMM）を外れたら範囲内へ丸める。
function openTimeWheel(initial, min, max, title, onConfirm){
  const parts = (initial || '00:00').split(':');
  const h = Math.max(0, Math.min(23, parseInt(parts[0], 10) || 0));
  const m = Math.max(0, Math.min(59, parseInt(parts[1], 10) || 0));
  const hours = []; for (let i = 0; i < 24; i++) hours.push(pad2(i));
  const mins = []; for (let i = 0; i < 60; i++) mins.push(pad2(i));
  openWheel(title || '時間を選択',
    [{ values: hours, initialIndex: h }, { values: mins, initialIndex: m }],
    function(idxs){
      let total = idxs[0] * 60 + idxs[1];
      if (min != null){ const t = hm2min(min); if (total < t) total = t; }
      if (max != null){ const t = hm2min(max); if (total > t) total = t; }
      onConfirm(pad2(Math.floor(total / 60)) + ':' + pad2(total % 60));
    });
}
// 数値ホイール（1列）。min〜maxをstep刻みで表示。
function openNumberWheel(initial, min, max, step, unit, title, onConfirm){
  const values = [];
  for (let v = min; v <= max; v += step) values.push(String(v));
  let idx = Math.round((initial - min) / step);
  idx = Math.max(0, Math.min(values.length - 1, idx));
  openWheel(title, [{ values: values, initialIndex: idx, unit: unit }], function(idxs){
    onConfirm(min + idxs[0] * step);
  });
}
// --- タップフィールド（共通） ---
// 実体の値は同じidの hidden input に入るので、既存の .value 参照はそのまま動きます。
function timeFieldHtml(fieldId, value){
  return '<div class="tapfield" id="' + fieldId + '-field">' +
           '<span class="tf-val">' + value + '</span><span class="tf-ico">&#9660; スクロール</span>' +
         '</div>' +
         '<input type="hidden" id="' + fieldId + '" value="' + value + '">';
}
function attachTimeField(fieldId, min, max, title){
  const field = document.getElementById(fieldId + '-field');
  const hidden = document.getElementById(fieldId);
  field.onclick = function(){
    openTimeWheel(hidden.value, min, max, title, function(v){
      hidden.value = v;
      field.querySelector('.tf-val').textContent = v;
    });
  };
}
function numberFieldHtml(fieldId, value, unit){
  return '<div class="tapfield" id="' + fieldId + '-field">' +
           '<span><span class="tf-val">' + value + '</span> ' + unit + '</span>' +
           '<span class="tf-ico">&#9660; スクロール</span>' +
         '</div>' +
         '<input type="hidden" id="' + fieldId + '" value="' + value + '">';
}
function attachNumberField(fieldId, min, max, step, unit, title){
  const field = document.getElementById(fieldId + '-field');
  const hidden = document.getElementById(fieldId);
  field.onclick = function(){
    openNumberWheel(Number(hidden.value), min, max, step, unit, title, function(val){
      hidden.value = String(val);
      field.querySelector('.tf-val').textContent = String(val);
    });
  };
}
// =====================================================================
// カメラ・QRスキャン
// =====================================================================
function facingLabel(){ return CAMERA_FACING === 'user' ? '内カメラ' : '外カメラ'; }
function updateCamSwitchLabel(){
  camSwitchEl.innerHTML = '📷 カメラ切替（現在：' + facingLabel() + '）';
}
async function startCamera(){
  if (typeof jsQR === 'undefined'){
    cameraErrorMsgEl.innerHTML = 'QR読み取りライブラリの読み込みに失敗しました。<br>インターネット接続を確認して、ページを再読み込みしてください。';
    cameraErrorEl.style.display = 'flex';
    debugEl.textContent = 'エラー：jsQRライブラリ未読み込み';
    return;
  }
  if (cameraStarted){
    scanning = true;
    return;
  }
  // 選択されたカメラ（内/外）を優先して起動。失敗時は徐々に条件を緩める。
  const primary = CAMERA_FACING === 'user' ? 'user' : 'environment';
  const attempts = [
    { video: { facingMode: { ideal: primary }, width: { ideal: 1280 }, height: { ideal: 720 } } },
    { video: { facingMode: primary } },
    { video: { facingMode: { exact: primary } } },
    { video: true } // 最後の手段：使えるカメラを何でも使う
  ];
  let lastErr = null;
  for (const constraints of attempts){
    try{
      const stream = await navigator.mediaDevices.getUserMedia(constraints);
      video.srcObject = stream;
      await video.play();
      cameraStarted = true;
      scanning = true;
      frameCount = 0;
      cameraErrorEl.style.display = 'none';
      debugEl.textContent = 'カメラ起動OK（' + facingLabel() + '）。QRを探しています…';
      requestAnimationFrame(tick);
      return;
    } catch(err){
      lastErr = err;
    }
  }
  cameraErrorEl.style.display = 'flex';
  debugEl.textContent = 'カメラ起動エラー：' + (lastErr ? (lastErr.name + ' ' + lastErr.message) : '不明');
}
// 内カメ⇔外カメ の切り替え
async function switchCamera(){
  CAMERA_FACING = (CAMERA_FACING === 'environment') ? 'user' : 'environment';
  localStorage.setItem(STORAGE_KEY_FACING, CAMERA_FACING);
  updateCamSwitchLabel();
  if (video.srcObject){
    video.srcObject.getTracks().forEach(function(t){ t.stop(); });
    video.srcObject = null;
  }
  cameraStarted = false;
  scanning = false;
  debugEl.textContent = facingLabel() + 'に切り替えています…';
  await startCamera();
}
camSwitchEl.onclick = switchCamera;
updateCamSwitchLabel();
function tick(){
  if (video.readyState === video.HAVE_ENOUGH_DATA && scanning){
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const code = jsQR(imageData.data, imageData.width, imageData.height, { inversionAttempts: 'attemptBoth' });
    frameCount++;
    if (frameCount % 30 === 0){
      debugEl.textContent = 'スキャン中… (' + video.videoWidth + 'x' + video.videoHeight + ' / ' + frameCount + 'フレーム)';
    }
    if (code && code.data) handleScan(code.data);
  }
  requestAnimationFrame(tick);
}
function handleScan(data){
  scanning = false;
  frameEl.classList.remove('pulse');
  let parsed = null;
  try { parsed = JSON.parse(data); } catch(e) { parsed = null; }
  if (!parsed || !parsed.id || !parsed.name){
    showErrorScreen('QRコードの形式が正しくありません');
    return;
  }
  currentTeacher = parsed;
  scanTime = new Date();
  lateState = null;
  showChoose();
}
// =====================================================================

// =====================================================================
// 読み取り時刻を「分」単位に切り捨てたDateを返す
//   例) 14:32:15 → 14:32:00
//   これにより「同じ分（14:32）」の入力を許可し、前の分（14:31）は不可にする
// =====================================================================
function scanFloorMinute(){
  const d = new Date(scanTime);
  d.setSeconds(0, 0);
  return d;
}

async function showSubstituteForm(){
  ovBodyEl.innerHTML = `<div style="text-align:center;color:var(--muted);">講師一覧を読み込んでいます…</div>`;
  let teachers = [];
  try{
    const json = await jsonpRequest({ type: 'teachers', teacherId: currentTeacher.id });
    if (!json || !json.ok){
      throw new Error((json && json.message) || '講師一覧の取得に失敗しました');
    }
    teachers = json.teachers || [];
  } catch(err){
    ovBodyEl.innerHTML = `
      <div class="ov-error">${escapeHtml(err.message || '講師一覧の取得に失敗しました')}</div>
      <div class="ov-actions">
        <button class="btn btn-ghost" id="btn-cancel">キャンセル</button>
        <button class="btn btn-primary" id="btn-retry">再試行</button>
      </div>
    `;
    document.getElementById('btn-cancel').onclick = resetToIdle;
    document.getElementById('btn-retry').onclick = showSubstituteForm;
    return;
  }
  teachers = teachers.filter(t => t.id && t.name);
  if (teachers.length === 0){
    ovBodyEl.innerHTML = `
      <div class="ov-error">選択できる代講者がいません（本人以外の講師が見つかりません）</div>
      <div class="ov-actions">
        <button class="btn btn-ghost" id="btn-cancel">キャンセル</button>
      </div>
    `;
    document.getElementById('btn-cancel').onclick = resetToIdle;
    return;
  }
  const options = teachers.map(t => `<option value="${escapeHtml(t.id)}">${escapeHtml(t.name)}</option>`).join('');
  ovBodyEl.innerHTML = `
    <div class="ov-note warn">代講対応：代講した講師を選択してください（本人は選べません）。</div>
    <label class="ov-label">代講者</label>
    <select class="ov-input" id="in-substitute">
      <option value="">選択してください</option>
      ${options}
    </select>
    <div class="ov-error" id="err-substitute"></div>
    <div class="ov-actions">
      <button class="btn btn-ghost" id="btn-cancel">キャンセル</button>
      <button class="btn btn-primary" id="btn-next">次へ</button>
    </div>
  `;
  document.getElementById('btn-cancel').onclick = resetToIdle;
  document.getElementById('btn-next').onclick = () => {
    const sel = document.getElementById('in-substitute');
    const id = sel.value;
    if (!id){
      document.getElementById('err-substitute').textContent = '代講者を選択してください';
      return;
    }
    lateState.substituteId = id;
    lateState.substituteName = sel.options[sel.selectedIndex].text;
    showLateStartForm();
  };
}

  const maxHHMM = toHHMM(scanTime);

  ovBodyEl.innerHTML = `

  `;
  attachTimeField('in-end', null, maxHHMM, '業務終了時間');
  attachNumberField('in-lessons', 0, 20, 1, 'コマ', '実施コマ数を選択');
  attachNumberField('in-break', 0, 180, 5, '分', '休憩時間を選択');
  document.getElementById('btn-cancel').onclick = resetToIdle;
  document.getElementById('btn-submit').onclick = () => {
    const hhmm = document.getElementById('in-end').value;
    if (!hhmm){
      document.getElementById('err-end').textContent = '時間を入力してください';
      return;
    }
    const workEnd = combineTodayTime(hhmm);
    const lessons = parseInt(document.getElementById('in-lessons').value, 10);
    const breakMin = parseInt(document.getElementById('in-break').value, 10);
    const comiruDone = document.getElementById('in-comiru').checked;
    if (workEnd > scanFloorMinute()){
      document.getElementById('err-end').textContent = '読み取り時刻（分）以前の時間を入力してください';
      return;
    }
    if (isNaN(lessons) || lessons < 0 || isNaN(breakMin) || breakMin < 0){
      document.getElementById('err-end').textContent = 'コマ数・休憩時間は0以上の数値で入力してください';

    }
    const reqBreak = requiredBreakMinutes(lessons);

      return;
    }
    submitCheckout(workEnd, lessons, breakMin, comiruDone);
  };
}
// =====================================================================
// 通信（JSONP）
// =====================================================================
function jsonpRequest(params){
  return new Promise((resolve, reject) => {
    const callbackName = 'jsonp_' + Date.now() + '_' + Math.floor(Math.random() * 100000);
    const script = document.createElement('script');
    const timeoutId = setTimeout(() => {
      cleanup();
      reject(new Error('タイムアウトしました'));
    }, 20000);
    function cleanup(){
      clearTimeout(timeoutId);
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    window[callbackName] = (data) => {
      cleanup();
      resolve(data);
    };
    const query = new URLSearchParams(Object.assign({}, params, { callback: callbackName })).toString();
    script.src = WEBHOOK_URL + '?' + query;
    script.onerror = () => {
      cleanup();
      reject(new Error('Webhookへの接続に失敗しました。設定のURLを確認してください'));
    };
    document.body.appendChild(script);
  });
}

  try{

async function submitLate(workStart){
  ovBodyEl.innerHTML = `<div style="text-align:center;color:var(--muted);">登録しています…</div>`;
  try{
    const params = {
      type: 'late',
      teacherId: currentTeacher.id,
      teacherName: currentTeacher.name,
      branch: BRANCH_NAME,
      scanTime: scanTime.toISOString(),
      workStartTime: workStart.toISOString(),

  } catch(err){
    showResult({ ok:false, message: err.message || '通信エラーです。もう一度お試しください。' });
  }
}

// 画面: 結果表示
// =====================================================================
function showResult(json, kind){
  ovTeacherEl.textContent = '';
  if (json && json.ok){
    if (kind === 'late'){
      ovBodyEl.innerHTML = `
        <div class="ov-result late">
          <div class="name">${escapeHtml(json.name)} 先生 遅刻を記録しました</div>
          <div class="time">${fmtTime(new Date(json.time))}</div>
          <div class="msg">${escapeHtml(LATE_ADMIN_MESSAGE).replace(/\n/g,'<br>')}</div>
        </div>
      `;
      setTimeout(resetToIdle, 6500);
      return;
    }
    const cls = kind === 'checkout' ? 'checkout' : 'ok';
    const verb = kind === 'checkout' ? '退勤' : '出勤';
    const msg = kind === 'checkout' ? pickRandom(CHECKOUT_MESSAGES) : pickRandom(CHECKIN_MESSAGES);
    ovBodyEl.innerHTML = `
      <div class="ov-result ${cls}">
        <div class="name">${escapeHtml(json.name)} 先生 ${verb}しました</div>
        <div class="time">${fmtTime(new Date(json.time))}</div>
        <div class="msg">${escapeHtml(msg)}</div>
      </div>
    `;
    setTimeout(resetToIdle, 3600);
  } else {
    ovBodyEl.innerHTML = `
      <div class="ov-result error">
        <div class="name">エラー</div>
        <div class="time">${escapeHtml((json && json.message) || '登録に失敗しました')}</div>
      </div>
    `;
    setTimeout(resetToIdle, 3600);
  }
}

// =====================================================================
// 共通
// =====================================================================
function openOverlay(){ overlayEl.classList.add('show'); }
function closeOverlay(){ overlayEl.classList.remove('show'); }
function resetToIdle(){
  closeOverlay();
  wheelEl.classList.remove('show');
  currentTeacher = null;
  scanTime = null;
  lateState = null;
  statusEl.textContent = 'QRコードを枠の中にかざしてください';
  frameEl.classList.add('pulse');
  scanning = true;
}
function toHHMM(date){
  const h = String(date.getHours()).padStart(2,'0');
  const m = String(date.getMinutes()).padStart(2,'0');
  return h + ':' + m;
}
function combineTodayTime(hhmm){
  const parts = hhmm.split(':');
  const d = new Date();
  d.setHours(Number(parts[0]), Number(parts[1]), 0, 0);
  return d;
}
function fmtTime(date){
  return date.toLocaleTimeString('ja-JP', {hour12:false});
}
function escapeHtml(str){
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
// =====================================================================
// 起動処理
// =====================================================================
document.getElementById('settings-link').onclick = () => {
  showSetupForm();
};
const savedWebhook = localStorage.getItem(STORAGE_KEY_WEBHOOK);
const savedBranch = localStorage.getItem(STORAGE_KEY_BRANCH);
if (savedWebhook && savedBranch){
  applyConfig(savedWebhook, savedBranch);
  startCamera();
} else {
  showSetupForm();
}
